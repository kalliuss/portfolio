<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator · Kallius</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg-card:   #111111;
      --bg-hover:  #1a1a1a;
      --border:    #222222;
      --accent:    #00ff88;
      --accent-dim:#00cc6a;
      --text:      #e0e0e0;
      --muted:     #555555;
      --font:      'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }

    .header .prompt {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .header .prompt span {
      color: var(--accent);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.75rem;
    }

    /* Section label */
    .section-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    /* Checkboxes */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .option:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .option input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid var(--muted);
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s;
    }

    .option input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: var(--accent);
    }

    .option input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1px; left: 3px;
      width: 5px; height: 8px;
      border: 2px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .option-label {
      font-size: 0.75rem;
      color: var(--text);
    }

    .option-sample {
      font-size: 0.65rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* Length */
    .length-row {
      margin-bottom: 1.5rem;
    }

    .length-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .length-value {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 0;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: none;
      border-radius: 0;
      cursor: pointer;
    }

    .length-limits {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* Output */
    .output-row {
      margin-bottom: 1.5rem;
    }

    .output-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: border-color 0.2s;
    }

    .output-box:focus-within {
      border-color: var(--accent);
    }

    #output {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      letter-spacing: 0.05em;
      cursor: default;
    }

    #copy-btn {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.7rem;
      padding: 0.75rem 0.9rem;
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
      display: none;
    }

    #copy-btn:hover { color: var(--accent); }

    /* Strength */
    .strength-row {
      margin-bottom: 1.5rem;
    }

    .strength-bar-wrap {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
    }

    .strength-seg {
      flex: 1;
      height: 3px;
      background: var(--border);
      transition: background 0.3s;
    }

    .strength-seg.active-weak   { background: #ff4444; }
    .strength-seg.active-fair   { background: #ffaa00; }
    .strength-seg.active-good   { background: #44aaff; }
    .strength-seg.active-strong { background: var(--accent); }

    .strength-label {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* Generate button */
    #generate-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }

    #generate-btn:hover {
      background: var(--accent);
      color: #000;
    }

    #countdown {
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0 0.75rem;
      display: none;
    }

    /* Footer */
    .footer {
      margin-top: 1.25rem;
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
    }

    .footer span { color: var(--accent); }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="prompt">~/<span>kallius</span> · tools</div>
    <h1># Password Generator</h1>
    <p>crypto.getRandomValues() tabanlı, güvenli şifre üreteci.</p>
  </div>

  <div class="card">

    <div class="section-label">// karakter seti</div>
    <div class="options">
      <label class="option">
        <input type="checkbox" id="lowercase" checked />
        <span class="option-label">Lowercase</span>
        <span class="option-sample">a-z</span>
      </label>
      <label class="option">
        <input type="checkbox" id="uppercase" checked />
        <span class="option-label">Uppercase</span>
        <span class="option-sample">A-Z</span>
      </label>
      <label class="option">
        <input type="checkbox" id="digits" checked />
        <span class="option-label">Digits</span>
        <span class="option-sample">0-9</span>
      </label>
      <label class="option">
        <input type="checkbox" id="symbols" />
        <span class="option-label">Symbols</span>
        <span class="option-sample">!@#</span>
      </label>
    </div>

    <div class="length-row">
      <div class="length-header">
        <span class="section-label" style="margin:0">// uzunluk</span>
        <span class="length-value" id="length-display">16</span>
      </div>
      <input type="range" id="length" min="8" max="64" value="16" />
      <div class="length-limits"><span>8</span><span>64</span></div>
    </div>

    <div class="output-row">
      <div class="section-label">// çıktı</div>
      <div class="output-box">
        <input type="text" id="output" readonly placeholder="→ generate et" />
        <button id="copy-btn">copy</button>
        <span id="countdown"></span>
      </div>
    </div>

    <div class="strength-row">
      <div class="section-label" style="margin:0">// güç</div>
      <div class="strength-bar-wrap">
        <div class="strength-seg" id="seg-1"></div>
        <div class="strength-seg" id="seg-2"></div>
        <div class="strength-seg" id="seg-3"></div>
        <div class="strength-seg" id="seg-4"></div>
      </div>
      <div class="strength-label" id="strength-label">—</div>
    </div>

    <button id="generate-btn">→ generate</button>

  </div>

  <div class="footer">
    crypto.getRandomValues() · <span>Fisher-Yates shuffle</span> · guaranteed inclusion
  </div>

</div>

<script src="script.js"></script>
<script>
  // Length slider display
  const lengthSlider = document.getElementById('length');
  const lengthDisplay = document.getElementById('length-display');
  lengthSlider.addEventListener('input', () => {
    lengthDisplay.textContent = lengthSlider.value;
  });

  // Strength calculator
  function calcStrength(password, options) {
    if (!password) return 0;
    const activeCount = Object.values(options).filter(Boolean).length;
    const len = password.length;
    if (activeCount >= 4 && len >= 20) return 4;
    if (activeCount >= 3 && len >= 14) return 3;
    if (activeCount >= 2 && len >= 10) return 2;
    return 1;
  }

  function renderStrength(level) {
    const labels = ['', 'weak', 'fair', 'good', 'strong'];
    const classes = ['', 'active-weak', 'active-fair', 'active-good', 'active-strong'];
    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById('seg-' + i);
      seg.className = 'strength-seg' + (i <= level ? ' ' + classes[level] : '');
    }
    document.getElementById('strength-label').textContent = labels[level] || '—';
  }

  // Strength güncelleme — generate butonunun mevcut listener'ı (script.js)
  // çalıştıktan sonra output'u okuyoruz.
  document.getElementById('generate-btn').addEventListener('click', () => {
    setTimeout(() => {
      const options = getOptions();
      const pw = document.getElementById('output').value;
      renderStrength(calcStrength(pw, options));
    }, 0);
  });
</script>

</body>
</html>
