<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metin Analiz Aracı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1e1e1e;
            --text: #e2e2e2;
            --muted: #555;
            --accent: #00ff88;
            --accent-dim: #00ff8822;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.7;
            cursor: none;
            min-height: 100vh;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.35;
        }

        /* Custom cursor */
        .cursor {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: screen;
        }
        .cursor-ring {
            width: 30px; height: 30px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.15s ease;
            opacity: 0.5;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 48px;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(12px);
        }

        .nav-logo {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-decoration: none;
        }
        .nav-logo span { color: var(--accent); }

        .nav-badge {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent-dim);
            padding: 3px 10px;
        }

        /* MAIN LAYOUT */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 48px 80px;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 48px;
        }

        .section-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-label::after {
            content: '';
            height: 1px;
            width: 60px;
            background: var(--accent);
            display: block;
            opacity: 0.4;
        }

        .page-title {
            font-family: var(--sans);
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 12px;
        }

        .page-desc {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        /* TEXTAREA */
        .input-wrapper {
            position: relative;
            margin-bottom: 1px;
        }

        .input-label {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: block;
        }

        #input {
            width: 100%;
            height: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.8;
            padding: 20px 24px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            cursor: none;
        }

        #input::placeholder { color: #333; }

        #input:focus {
            border-color: var(--accent);
            background: #0d0d0d;
        }

        /* STATS GRID */
        #stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg);
            padding: 24px 20px;
            transition: background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .stat-card:hover { background: var(--surface); }
        .stat-card:hover::before { width: 100%; }

        .stat-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
            display: block;
        }

        .stat-value {
            font-family: var(--sans);
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .stat-unit {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            display: block;
        }

        /* BOTTOM ROW */
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .panel {
            background: var(--bg);
            padding: 28px;
        }

        .panel-title {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* TOP WORDS */
        #topWordList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #topWordList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 1px solid var(--border);
            font-size: 12px;
            color: #888;
            transition: all 0.2s;
        }

        #topWordList li:hover {
            border-color: var(--accent);
            color: var(--text);
            background: var(--accent-dim);
        }

        #topWordList li .word { color: var(--text); }

        #topWordList li .count {
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 0.1em;
        }

        .empty-state {
            font-size: 12px;
            color: #333;
            font-style: italic;
        }

        /* SEARCH */
        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s;
            cursor: none;
            margin-bottom: 0;
        }

        #searchInput::placeholder { color: #333; }

        #searchInput:focus {
            border-color: var(--accent);
        }

        .search-result {
            padding: 14px 16px;
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.2s;
        }

        .search-result.has-result {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .search-result .result-label {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        #searchResult {
            color: var(--accent);
            font-weight: 500;
        }

        /* FOOTER */
        .tool-footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #333;
            font-size: 11px;
            letter-spacing: 0.06em;
        }

        .tool-footer a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .tool-footer a:hover { color: var(--accent); }

        @media (max-width: 640px) {
            nav { padding: 16px 24px; }
            main { padding: 100px 24px 60px; }
            #stats { grid-template-columns: repeat(2, 1fr); }
            .bottom-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <nav>
        <a href="/" class="nav-logo"><span>~/</span>kallius</a>
        <span class="nav-badge">tool · 01</span>
    </nav>

    <main>
        <div class="page-header">
            <div class="section-label">projects</div>
            <h1 class="page-title">Metin Analiz Aracı</h1>
            <p class="page-desc">String methods · Regex · DOM manipulation</p>
        </div>

        <span class="input-label">$ input text</span>
        <div class="input-wrapper">
            <textarea id="input" placeholder="Analiz edilecek metni buraya yaz..."></textarea>
        </div>

        <div id="stats">
            <div class="stat-card">
                <span class="stat-label">Karakter</span>
                <span class="stat-value" id="charTotal">0</span>
                <span class="stat-unit">boşluklu</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Karakter</span>
                <span class="stat-value" id="charNoSpace">0</span>
                <span class="stat-unit">boşluksuz</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Kelime</span>
                <span class="stat-value" id="wordCount">0</span>
                <span class="stat-unit">adet</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Cümle</span>
                <span class="stat-value" id="sentenceCount">0</span>
                <span class="stat-unit">adet</span>
            </div>
        </div>

        <div class="bottom-row">
            <div class="panel">
                <div class="panel-title">En çok tekrar edenler</div>
                <ul id="topWordList">
                    <li class="empty-state">— henüz metin yok</li>
                </ul>
            </div>

            <div class="panel">
                <div class="panel-title">Kelime ara</div>
                <input type="text" id="searchInput" placeholder="$ kelime_ara...">
                <div class="search-result" id="searchResultBox">
                    <span class="result-label">sonuç</span>
                    <span id="searchResult">—</span>
                </div>
            </div>
        </div>

        <div class="tool-footer">
            <span>metin-analiz-araci v1.0</span>
            <a href="/">← portfolio'ya dön</a>
        </div>
    </main>

    <script src="main.js"></script>

    <script>
        // Cursor
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursor.style.left = mx - 4 + 'px';
            cursor.style.top = my - 4 + 'px';
        });

        (function animateRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            ring.style.left = rx - 15 + 'px';
            ring.style.top = ry - 15 + 'px';
            requestAnimationFrame(animateRing);
        })();

        document.querySelectorAll('a, button, input, textarea').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(2.5)';
                ring.style.transform = 'scale(0.6)';
                ring.style.opacity = '1';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                ring.style.transform = 'scale(1)';
                ring.style.opacity = '0.5';
            });
        });

        // Search result highlight
        document.getElementById('searchInput').addEventListener('input', function() {
            const box = document.getElementById('searchResultBox');
            if (this.value.trim()) {
                box.classList.add('has-result');
            } else {
                box.classList.remove('has-result');
            }
        });
    </script>
    

</body>
</html>
